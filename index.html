<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arsal's Cloud Dev Site</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: white;
      text-align: center;
      padding: 60px 20px;
    }

    .card {
      max-width: 700px;
      margin: auto;
      background: rgba(255,255,255,0.15);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    p {
      font-size: 20px;
      line-height: 1.6;
    }

    .tag {
      margin-top: 20px;
      display: inline-block;
      padding: 10px 20px;
      background: white;
      color: #0077b6;
      border-radius: 30px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello, I'm Arsal Farooq</h1>
    <p>I am a Cloud Development student learning how GitHub and Netlify work together in a real CI/CD pipeline.</p>
    <p>This is my first live deployment, and I’m excited to build more projects.</p>
    <div class="tag">CSCI 6343 – Cloud Development</div>
  </div>
</body>
</html>
